<html>


<head>

<title>Cart</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>Your Cart</h1>


<div id="cart"></div>



<script>


fetch("/cart/1")

.then(res=>res.json())

.then(data=>{


let output="";


data.forEach(item=>{


output+=`

<h3>
${item.name} 
₹${item.price}
</h3>


`;


});


document.getElementById("cart").innerHTML=output;



});



</script>


</body>

</html>
